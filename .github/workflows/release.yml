name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (core, angular, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - angular

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        if: github.ref_type == 'tag'
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package versions
        if: github.ref_type == 'tag'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          cd packages/core
          npm version $VERSION --no-git-tag-version --allow-same-version
          cd ../..
          cd packages/angular
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm pkg set peerDependencies.@svgflex/core="^$VERSION"
          cd ../..

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish @svgflex/core
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'core' || github.ref_type == 'tag'
        working-directory: ./packages/core/dist
        run: npm publish --provenance --access public

      - name: Publish @svgflex/angular
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'angular' || github.ref_type == 'tag'
        working-directory: ./dist/angular
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "## Packages Published
          - @svgflex/core@${{ github.ref_name }}
          - @svgflex/angular@${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
